<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nine-Security | Governance Maturity Terminal</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030407;
            --card: #0d0f14;
            --card-hover: #161a23;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(0, 255, 157, 0.3);
            --text: #f0f2f5;
            --dim: #94a3b8;
            --accent: #00ff9d;
            --accent-glow: rgba(0, 255, 157, 0.15);
            
            /* Maturity Colors */
            --lvl-a: #00ff9d; /* Resilient */
            --lvl-b: #00d4ff; /* Optimized */
            --lvl-c: #fbbf24; /* Managed */
            --lvl-d: #f43f5e; /* High Risk */
            
            --glass: rgba(13, 15, 20, 0.7);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 157, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 212, 255, 0.03) 0%, transparent 40%);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        h1, h2, h3 {
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 1.85rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 svg {
            width: 32px;
            height: 32px;
            fill: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .card-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .card-panel:hover {
            border-color: var(--border-hover);
        }

        .card-panel h2 {
            font-size: 0.85rem;
            color: var(--dim);
            margin: 0 0 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Inputs & Buttons */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--dim); font-size: 0.85rem; }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 18px;
            border-radius: 12px;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 255, 157, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 255, 157, 0.1);
        }

        button {
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #00d4ff 100%);
            color: #030407;
            box-shadow: 0 8px 16px rgba(0, 255, 157, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 255, 157, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--dim);
        }

        .btn-danger {
            background: rgba(244, 63, 94, 0.1);
            color: var(--lvl-d);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        /* Tabs */
        .dashboard-tabs {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .dashboard-tabs button {
            background: transparent;
            color: var(--dim);
            padding: 10px 24px;
            border: none;
            font-size: 0.95rem;
        }

        .dashboard-tabs button.active {
            background: var(--accent);
            color: #030407;
            border-radius: 10px;
        }

        /* Utility */
        .hidden { display: none !important; }
        .msg { padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .msg.err { background: rgba(244, 63, 94, 0.1); color: var(--lvl-d); border: 1px solid rgba(244, 63, 94, 0.2); }
        .msg.ok { background: rgba(0, 255, 157, 0.1); color: var(--lvl-a); border: 1px solid rgba(0, 255, 157, 0.2); }

        /* Login Screen */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 5vh;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 24px 48px rgba(0,0,0,0.6);
        }

        /* Dashboard UI */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        /* Stats Grid */
        .summary-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            padding: 1.75rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .stat-label {
            color: var(--dim);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Domain Cards */
        .domain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
            margin-top: 1.5rem;
        }

        .domain-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .domain-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.04);
        }

        .domain-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .domain-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: #fff;
        }

        .score-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Status badges */
        .score-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .score-a { color: var(--lvl-a); background: rgba(0, 255, 157, 0.1); border: 1px solid rgba(0, 255, 157, 0.2); }
        .score-b { color: var(--lvl-b); background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); }
        .score-c { color: var(--lvl-c); background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
        .score-d { color: var(--lvl-d); background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); }

        .toast {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            background: #0d0f14;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 1.25rem 2rem;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.8);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000;
            font-weight: 600;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* Icons */
        .icon { width: 1.4em; height: 1.4em; vertical-align: middle; fill: currentColor; }

        /* Environments Management */
        .env-block {
            background: rgba(255, 255, 255, 0.015);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); }
        td { padding: 1.5rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container" id="loginScreen">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1>
                <svg viewBox="0 0 24 24"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10.91v7.09c-2.68-1.11-4.73-4.39-4.97-8H12z"/></svg>
                Nine-Security
            </h1>
            <p style="color: var(--dim); margin-top: 1rem; font-weight: 400;">Advanced Governance Operations Platform</p>
        </div>

        <div class="auth-card">
            <div class="dashboard-tabs" style="margin: 0 auto 2.5rem;">
                <button type="button" id="tabLogin" class="active">Sign In</button>
                <button type="button" id="tabSignup">Create Account</button>
            </div>

            <div id="loginForm">
                <div id="loginMsg" class="msg hidden"></div>
                <div class="form-group">
                    <label>Corporate Email</label>
                    <input type="email" id="loginEmail" placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button type="button" id="btnLogin" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                    Access Terminal
                </button>
            </div>

            <div id="signupForm" class="hidden">
                <div id="signupMsg" class="msg hidden"></div>
                <div class="form-group">
                    <label>Enterprise Name</label>
                    <input type="text" id="signupOrg" placeholder="Nine Security INC.">
                </div>
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" id="signupEmail" placeholder="admin@company.com">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="signupPassword" placeholder="Min 8 characters">
                </div>
                <button type="button" id="btnSignup" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                    Initialize Account
                </button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="dashboard">
        <div class="user-bar">
            <h1>
                <svg viewBox="0 0 24 24"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10.91v7.09c-2.68-1.11-4.73-4.39-4.97-8H12z"/></svg>
                Nine-Security <span style="font-weight: 300; opacity: 0.6; margin-left: 8px;">Governance</span>
            </h1>
            <div style="display: flex; align-items: center; gap: 24px;">
                <div style="text-align: right;">
                    <div id="userInfo" style="font-weight: 600; font-size: 0.95rem;"></div>
                    <div style="color: var(--dim); font-size: 0.75rem; text-transform: uppercase;">Authenticated Session</div>
                </div>
                <button type="button" id="btnLogout" class="btn-secondary" style="padding: 10px 16px; font-size: 0.85rem">Exit</button>
            </div>
        </div>

        <div class="dashboard-tabs">
            <button type="button" id="dashTabOverview" class="active">Maturity Dashboard</button>
            <button type="button" id="dashTabEnvs">Resource Management</button>
        </div>

        <div id="panelOverview" class="dashboard-panel">
            <div id="insightsArea">
                <div class="stat-card" style="text-align: center; padding: 4rem 1rem;">
                    <div style="color: var(--dim)">Synchronizing posture analytics...</div>
                </div>
            </div>
        </div>

        <div id="panelEnvs" class="dashboard-panel hidden">
            <div class="card-panel" style="margin-bottom: 0px; border-bottom: none; border-radius: 20px 20px 0 0;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="margin:0">Environment Inventory</h2>
                    <button type="button" id="btnNewTask" class="btn-primary" style="padding: 10px 20px; font-size: 0.9rem;">
                        Register New Env
                    </button>
                </div>
            </div>
            <div id="envsArea" style="padding: 2rem; background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 20px 20px;">
                Searching registered systems...
            </div>
        </div>
    </div>

    <div id="toast" class="toast" aria-hidden="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/dist/fflate.min.js"></script>
    <script>
        const API_BASE = "https://api.nine-security.com";
        let govCsrfToken = null;
        let csrfLogoutShown = false;
        let idleTimer = null;
        const IDLE_TIMEOUT = 30 * 60 * 1000;
        const SESSION_CHECK_INTERVAL = 5 * 60 * 1000;

        function resetIdleTimer() {
            if (idleTimer) clearTimeout(idleTimer);
            if (document.getElementById("dashboard").classList.contains("visible")) {
                idleTimer = setTimeout(forceLogout, IDLE_TIMEOUT);
            }
        }

        async function forceLogout(reason = "Session timeout due to inactivity.") {
            showToast(reason);
            await api("/api/governance/logout", { method: "POST" });
            govCsrfToken = null;
            document.getElementById("dashboard").classList.add("hidden");
            document.getElementById("loginScreen").classList.remove("hidden");
            if (idleTimer) clearTimeout(idleTimer);
        }

        async function validateSession() {
            if (document.getElementById("loginScreen").classList.contains("hidden")) {
                try {
                    const j = await api("/api/governance/me");
                    if (!j || !j.ok) forceLogout("Session expired.");
                } catch (e) {}
            }
        }

        ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(name => {
            document.addEventListener(name, resetIdleTimer, true);
        });

        setInterval(validateSession, SESSION_CHECK_INTERVAL);

        function showMsg(elId, text, isErr) {
            const el = document.getElementById(elId);
            el.className = "msg " + (isErr ? "err" : "ok");
            el.textContent = text;
            el.classList.remove("hidden");
        }
        function hideMsg(elId) { document.getElementById(elId).classList.add("hidden"); }
        function showToast(message) {
            const el = document.getElementById("toast");
            el.textContent = message;
            el.classList.add("show");
            clearTimeout(el._toastTimer);
            el._toastTimer = setTimeout(() => {
                el.classList.remove("show");
            }, 4000);
        }
        function escapeHtml(s) {
            return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }

        async function api(path, opts = {}) {
            const url = API_BASE + path;
            const method = (opts.method || "GET").toUpperCase();
            const headers = { ...(opts.headers || {}) };
            if (path.startsWith("/api/governance/") && (method === "POST" || method === "DELETE") && govCsrfToken) {
                headers["X-CSRF-Token"] = govCsrfToken;
            }
            const fetchOpts = { credentials: "include", ...opts };
            fetchOpts.headers = headers;
            const res = await fetch(url, fetchOpts);
            const contentType = res.headers.get("content-type") || "";
            if (contentType.includes("application/json")) return await res.json();
            return res;
        }

        function showDashboard() {
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("dashboard").classList.add("visible");
            loadMe();
            loadInsights();
            switchDashboardTab("Overview");
            resetIdleTimer();
        }

        function switchDashboardTab(name) {
            document.querySelectorAll(".dashboard-tabs button").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".dashboard-panel").forEach(p => p.classList.add("hidden"));
            if (name === "Overview") {
                document.getElementById("dashTabOverview").classList.add("active");
                document.getElementById("panelOverview").classList.remove("hidden");
            } else if (name === "Environments") {
                document.getElementById("dashTabEnvs").classList.add("active");
                document.getElementById("panelEnvs").classList.remove("hidden");
                loadEnvs();
            }
        }

        async function loadMe() {
            const j = await api("/api/governance/me");
            if (j && j.ok && j.user) {
                document.getElementById("userInfo").textContent = j.user.email;
                if (j.csrf_token) govCsrfToken = j.csrf_token;
            }
        }

        async function loadInsights() {
            const el = document.getElementById("insightsArea");
            const j = await api("/api/governance/insights");
            if (!j || !j.ok) {
                el.innerHTML = `<div class="stat-card" style="text-align:center; padding: 3rem;"><p color="var(--dim)">${j && j.data === null ? 'Create a task to begin posture analysis.' : 'Error synchronizing telemetry.'}</p></div>`;
                return;
            }
            const d = j.data;
            const envs = d.environments || [];
            const summary = d.summary || {};
            
            if (envs.length === 0) {
                el.innerHTML = `<div class="stat-card" style="text-align:center; padding: 4rem;"><p style="color:var(--dim); font-size:1.1rem; margin-bottom:1rem;">Ready for First Assessment</p><p style="color:var(--dim); font-size:0.9rem;">Register an environment to generate your first ETMI maturity index.</p></div>`;
                return;
            }

            const avgScore = summary.overall_score_avg != null ? Math.round(summary.overall_score_avg) : 0;
            const latestAt = summary.latest_at ? new Date(summary.latest_at).toLocaleDateString() + ' ' + new Date(summary.latest_at).toLocaleTimeString() : "—";
            
            let html = `
                <div class="summary-header">
                    <div class="stat-card">
                        <div class="stat-value" style="color: ${avgScore >= 75 ? 'var(--lvl-a)' : avgScore >= 45 ? 'var(--lvl-c)' : 'var(--lvl-d)'}">${avgScore}</div>
                        <div class="stat-label">Network Maturity (ETMI)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="font-size: 1.15rem; margin: 10px 0;">${latestAt}</div>
                        <div class="stat-label">Last Threat Intelligence Sync</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${summary.environment_count || envs.length}</div>
                        <div class="stat-label">Monitored Assets</div>
                    </div>
                </div>
            `;

            envs.forEach(function(ev) {
                const r = ev.report;
                const name = escapeHtml(ev.env_name || ev.environment_id || "—");
                
                html += `
                    <div class="env-group" style="margin-top: 4rem;">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem;">
                            <h3 style="margin:0; font-size: 1.35rem; display: flex; align-items: center; gap: 14px;">
                                <svg class="icon" style="color:var(--accent)"><path d="M22 19V6C22 4.9 21.1 4 20 4H4C2.9 4 2 4.9 2 6V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19M4 6H20V19H4V6M6 9H18V11H6V9M6 13H15V15H6V13Z"/></svg>
                                ${name}
                                ${r ? `<span class="score-badge score-${(r.risk_level || 'D').toLowerCase()}">${r.risk_level}</span>` : ''}
                            </h3>
                            ${r ? `<span style="font-family: 'JetBrains Mono'; color:var(--dim); font-size:0.8rem; background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:6px;">REF_ID: ${r.id.slice(0,8).toUpperCase()}</span>` : ''}
                        </div>
                `;

                if (!r) {
                    html += `<div class="stat-card" style="text-align: center; padding: 4rem 1rem;"><p style="color:var(--dim)">System registered. Awaiting initial collector payload...</p></div>`;
                } else {
                    html += `<div class="domain-grid">`;
                    if (ev.domains && ev.domains.length) {
                        ev.domains.forEach(function(x) {
                            const dScore = x.score != null ? Math.round(x.score) : 0;
                            const dCls = dScore >= 90 ? 'lvl-a' : dScore >= 75 ? 'lvl-b' : dScore >= 60 ? 'lvl-c' : 'lvl-d';
                            html += `
                                <div class="domain-card">
                                    <div class="domain-info">
                                        <span class="domain-name">${escapeHtml(x.domain_name || "—")}</span>
                                        <span class="score-val" style="color: var(--${dCls})">${dScore}</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" style="width: ${dScore}%; background: var(--${dCls})"></div>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            });

            el.innerHTML = html;
        }

        async function loadEnvs() {
            const el = document.getElementById("envsArea");
            el.innerHTML = `<div style="color:var(--dim); text-align:center; padding:2rem;">Synchronizing asset database...</div>`;
            try {
                const [envRes, tasksRes] = await Promise.all([
                    api("/api/governance/environments"),
                    api("/api/governance/tasks")
                ]);
                const envs = (envRes && envRes.ok && envRes.data) ? envRes.data : [];
                const tasks = (tasksRes && tasksRes.ok && tasksRes.data) ? tasksRes.data : [];
                const byEnv = {};
                envs.forEach(e => { byEnv[e.id] = { name: e.name || e.id, tasks: [] }; });
                tasks.forEach(t => {
                    const eid = t.environment_id || "";
                    if (!byEnv[eid]) byEnv[eid] = { name: t.env_name || eid, tasks: [] };
                    byEnv[eid].tasks.push(t);
                });
                if (envs.length === 0 && Object.keys(byEnv).length === 0) {
                    el.innerHTML = `<div style="color:var(--dim); text-align:center; padding:2rem;">No registered environments found. Register an asset to begin.</div>`;
                    return;
                }
                const envIds = envs.length ? envs.map(e => e.id) : Object.keys(byEnv);
                el.innerHTML = envIds.map(envId => {
                    const block = byEnv[envId] || { name: envId, tasks: [] };
                    const taskRows = (block.tasks || []).map(t => {
                        const created = t.created_at ? new Date(t.created_at).toLocaleString() : "—";
                        const status = (t.status || "pending").toUpperCase();
                        const downloadUrl = API_BASE + "/api/governance/download/" + encodeURIComponent(t.id) + "?token=" + encodeURIComponent(t.token || "");
                        const action = status === "PENDING" ? `<a href="${downloadUrl}" target="_blank">Download Bundle</a>` : "Assessment Complete";
                        return `<tr><td>${created}</td><td><span class="score-badge" style="background:rgba(255,255,255,0.05); color:var(--text);">${status}</span></td><td>${action}</td></tr>`;
                    }).join("");
                    const tableHtml = block.tasks && block.tasks.length
                        ? `<table><thead><tr><th>Registration Time</th><th>Status</th><th>Operations</th></tr></thead><tbody>${taskRows}</tbody></table>`
                        : `<p style="color:var(--dim); font-size:0.9rem; margin-top:1rem;">No diagnostic tasks initialized for this asset.</p>`;
                    return `<div class="env-block"><h3>${escapeHtml(block.name || envId)}</h3>${tableHtml}<button type="button" class="btn-danger" style="margin-top:1.5rem; padding: 8px 16px; font-size:0.8rem;" data-clear-env="${envId}">Purge Asset Telemetry</button></div>`;
                }).join("");
            } catch (e) {
                el.innerHTML = `<p class="msg err">Failed to synchronize asset database.</p>`;
            }
        }

        // Event Listeners
        document.getElementById("tabLogin").addEventListener("click", () => {
            document.getElementById("tabLogin").classList.add("active");
            document.getElementById("tabSignup").classList.remove("active");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("signupForm").classList.add("hidden");
        });
        document.getElementById("tabSignup").addEventListener("click", () => {
            document.getElementById("tabSignup").classList.add("active");
            document.getElementById("tabLogin").classList.remove("active");
            document.getElementById("signupForm").classList.remove("hidden");
            document.getElementById("loginForm").classList.add("hidden");
        });

        document.getElementById("btnLogin").addEventListener("click", async () => {
            hideMsg("loginMsg");
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            if (!email || !password) return;
            try {
                const j = await api("/api/governance/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                if (j && j.ok) {
                    govCsrfToken = j.csrf_token;
                    showDashboard();
                } else {
                    showMsg("loginMsg", j.error || "Authentication failed.", true);
                }
            } catch (e) { showMsg("loginMsg", "Network connection failed.", true); }
        });

        document.getElementById("btnSignup").addEventListener("click", async () => {
            hideMsg("signupMsg");
            const org_name = document.getElementById("signupOrg").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value;
            if (!org_name || !email || password.length < 8) return;
            try {
                const j = await api("/api/governance/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password, org_name })
                });
                if (j && j.ok) {
                    showMsg("signupMsg", "Deployment successful. You may now sign in.", false);
                } else {
                    showMsg("signupMsg", j.error || "Initialization failed.", true);
                }
            } catch (e) { showMsg("signupMsg", "Network connection failed.", true); }
        });

        document.getElementById("btnLogout").addEventListener("click", async () => {
            await api("/api/governance/logout", { method: "POST" });
            govCsrfToken = null;
            location.reload();
        });

        async function runNewTask() {
            const envName = prompt("Register New Asset Environment (e.g. Production Cluster A):");
            if (!envName) return;
            try {
                const j = await api("/api/governance/session", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ environment_id: envName.trim() })
                });
                if (j && j.ok) {
                    const downloadUrl = API_BASE + "/api/governance/download/" + j.data.upload_session_id + "?token=" + encodeURIComponent(j.data.token);
                    const a = document.createElement("a");
                    a.href = downloadUrl;
                    a.download = "nine-security-collector.zip";
                    a.click();
                    showToast("Diagnostic Bundle Prepared & Downloaded.");
                    if (document.getElementById("panelEnvs").classList.contains("visible")) loadEnvs();
                    loadInsights();
                } else { showToast(j.error || "Task registration failed."); }
            } catch (e) { showToast("Network synchronization failed."); }
        }

        document.body.addEventListener("click", async (e) => {
            const el = e.target;
            if (el.id === "dashTabOverview") switchDashboardTab("Overview");
            if (el.id === "dashTabEnvs") switchDashboardTab("Environments");
            if (el.id === "btnNewTask") runNewTask();
            if (el.hasAttribute("data-clear-env")) {
                const id = el.getAttribute("data-clear-env");
                if (confirm("Permanently purge all telemetry for this asset?")) {
                    await api("/api/governance/environment/" + encodeURIComponent(id) + "/data", { method: "DELETE" });
                    loadEnvs();
                    loadInsights();
                    showToast("Asset telemetry purged.");
                }
            }
        });

        (async function init() {
            try {
                const j = await api("/api/governance/me");
                if (j && j.ok && j.user) showDashboard();
            } catch (e) {}
        })();
    </script>
</body>
</html>
